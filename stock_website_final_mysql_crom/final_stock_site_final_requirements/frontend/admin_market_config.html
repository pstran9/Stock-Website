<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Market Configuration</title><link rel="stylesheet" href="styles.css"></head><body data-protected="true" data-admin-only="true"><header><h1>Market Hours and Schedule</h1><nav><a href="admin_home.html">Dashboard</a><a href="admin_edit_stocks.html">Manage Stocks</a><a href="#" onclick="logout()">Logout</a></nav></header><main class="container"><div id="pageAlert" class="alert"></div><div class="grid"><div class="card"><h2>Update Market Hours</h2><form id="hoursForm"><label>Weekday (1=Mon ... 5=Fri)</label><input name="dayOfWeek" type="number" min="1" max="5" required><label>Open Time (UTC)</label><input name="openTimeUtc" value="13:30:00" required><label>Close Time (UTC)</label><input name="closeTimeUtc" value="20:00:00" required><button class="button primary" type="submit">Save Hours</button></form><div id="hoursList"></div></div><div class="card"><h2>Manage Holidays</h2><form id="holidayForm"><label>Date</label><input name="holidayDate" type="date" required><label>Name</label><input name="name" required><button class="button primary" type="submit">Save Holiday</button></form><table><thead><tr><th>Date</th><th>Name</th><th>Action</th></tr></thead><tbody id="holidayTableBody"></tbody></table></div></div></main><script src="main.js"></script></body></html>
