<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Manage Stocks</title><link rel="stylesheet" href="styles.css"></head><body data-protected="true" data-admin-only="true"><header><h1>Admin Stock Management</h1><nav><a href="admin_home.html">Dashboard</a><a href="market.html">Market</a><a href="admin_market_config.html">Market Config</a><a href="#" onclick="logout()">Logout</a></nav></header><main class="container"><div id="pageAlert" class="alert"></div><div class="grid"><div class="card"><h2>Add or Edit Stock</h2><form id="stockForm"><input id="stockFormMode" type="hidden" value="create"><label>Symbol</label><input id="symbolInput" required><label>Company</label><input id="companyInput" required><div class="form-row"><div><label>Volume</label><input id="volumeInput" type="number" min="0" required></div><div><label>Initial Price</label><input id="priceInput" type="number" step="0.01" required></div></div><div class="form-row"><div><label>Volatility</label><input id="volatilityInput" type="number" step="0.0001" value="0.02"></div><div><label>Drift</label><input id="driftInput" type="number" step="0.0001" value="0.0001"></div></div><button class="button primary" type="submit">Save Stock</button></form></div><div class="card"><h2>Current Stocks (<span id="stockCount">0</span>)</h2><table><thead><tr><th>Symbol</th><th>Company</th><th>Price</th><th>Volume</th><th>Market Cap</th><th>Open</th><th>High</th><th>Low</th><th>Actions</th></tr></thead><tbody id="adminTableBody"></tbody></table></div></div></main><script src="main.js"></script></body></html>
