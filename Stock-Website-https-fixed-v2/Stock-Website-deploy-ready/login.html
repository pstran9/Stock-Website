<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="top-header">
    <h1 class="site-title">Cloud-Based Stock Trading Simulation</h1>

    <div class="top-actions">
      <a href="create-account.html" class="btn create-btn">Create Account</a>
    </div>
  </header>

  <nav class="navbar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="market.html">Stock Market</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>

  <h1>Login</h1>
  <p>Please enter your email and password to log in.</p>

  <form id="loginForm">
    <div>
      <label for="username">Email</label>
      <input type="email" id="username" name="username" autocomplete="username" required>
    </div>

    <div>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>

    <div>
      <button type="submit">Login</button>
    </div>
  </form>

  <script src="config.js"></script>
<script src="main.js"></script>
</body>

</html>
